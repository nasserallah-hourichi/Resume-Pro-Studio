<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pro Resume Studio | Resume Builder</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico?v=1">
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico?v=1">
    <link rel="icon" type="image/png" href="./favicon-preview.png?v=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <div class="main-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-file-signature"></i>
                </div>
                <div class="logo-text">
                    <span class="logo-title">Pro Resume Studio</span>
                    <span class="logo-tagline">Create - Customize - Shine</span>
                </div>
            </div>
            <div class="header-actions">
                <div class="lang-switch">
                    <button class="lang-btn active" data-lang="en">EN</button>
                    <button class="lang-btn" data-lang="fr">FR</button>
                </div>
                <div class="action-buttons">
                    <button id="savePdfBtn" class="btn-icon"><i class="fas fa-file-pdf"></i> PDF Resume</button>
                    <button id="importResumeBtn" class="btn-icon btn-outline"><i class="fas fa-upload"></i> Import
                        JSON</button>
                    <button id="exportDataBtn" class="btn-icon btn-outline"><i class="fas fa-download"></i>
                        Export</button>
                    <button id="resetDemoBtn" class="btn-icon btn-outline"><i class="fas fa-undo"></i> Reset</button>
                    <input type="file" id="importFile" accept=".json" hidden>
                </div>
            </div>
        </div>

        <div class="studio-layout">
            <aside class="studio-sidebar">
                <section class="sidebar-panel">
                    <div class="panel-header">
                        <span class="panel-eyebrow">Layouts</span>
                        <h2>Templates</h2>
                    </div>
                    <div id="templateList" class="template-list"></div>
                </section>

                <section class="sidebar-panel">
                    <div class="panel-header">
                        <span class="panel-eyebrow">Quick Styles</span>
                        <h2>Theme Presets</h2>
                    </div>
                    <div id="themePresetList" class="theme-preset-list"></div>
                </section>

                <section class="sidebar-panel">
                    <div class="panel-header">
                        <span class="panel-eyebrow">Visibility</span>
                        <h2>Sections</h2>
                    </div>
                    <button id="addCustomSectionBtn" class="sidebar-action-btn"><i class="fas fa-plus"></i> Add Custom
                        Section</button>
                    <div id="sectionVisibilityControls" class="section-toggle-list"></div>
                </section>
            </aside>

            <main class="studio-main">
                <div class="design-panel">
                    <div class="controls-row">
                        <div class="style-group">
                            <div class="ctrl"><label>Font</label><select id="globalFontSelect">
                                    <option value="'Inter', sans-serif">Inter</option>
                                    <option value="'Roboto', sans-serif">Roboto</option>
                                    <option value="'Poppins', sans-serif">Poppins</option>
                                    <option value="'Montserrat', sans-serif">Montserrat</option>
                                    <option value="'Merriweather', serif">Merriweather</option>
                                </select></div>
                            <div class="ctrl"><label>Base Size</label><select id="baseFontSize">
                                    <option value="12px">12px</option>
                                    <option value="13px">13px</option>
                                    <option value="14px" selected>14px</option>
                                    <option value="15px">15px</option>
                                </select></div>
                            <div class="ctrl"><label>Section Title</label><input type="color" id="sectionTitleColor"
                                    value="#0f172a" class="color-input"></div>
                            <div class="ctrl"><label>Text Color</label><input type="color" id="textColor"
                                    value="#1e293b" class="color-input"></div>
                            <div class="ctrl"><label>Name Color</label><input type="color" id="nameColor"
                                    value="#0f172a" class="color-input"></div>
                            <div class="ctrl"><label>Headline</label><input type="color" id="headlineColor"
                                    value="#334155" class="color-input"></div>
                        </div>
                    </div>
                    <div class="controls-row secondary">
                        <div class="ctrl"><label>Exp Title Color</label><input type="color" id="expTitleColor"
                                value="#0f172a"></div>
                        <div class="ctrl"><label>Company Color</label><input type="color" id="companyColor"
                                value="#475569"></div>
                        <div class="ctrl"><label>Date Color</label><input type="color" id="dateColor" value="#64748b">
                        </div>
                        <div class="ctrl"><label>Section Title Size</label><select id="sectionTitleSize">
                                <option value="0.85rem">0.85rem</option>
                                <option value="0.9rem" selected>0.9rem</option>
                                <option value="1rem">1rem</option>
                            </select></div>
                        <div class="ctrl"><label>Skills Columns</label><select id="skillsColumnsSelect">
                                <option value="2">2 Columns</option>
                                <option value="3" selected>3 Columns</option>
                                <option value="4">4 Columns</option>
                            </select></div>
                    </div>
                </div>

                <div class="resume-stage">
                    <div class="resume-card" id="resumeCard">
                        <div class="resume-content" id="resumeContainer"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="server.js"></script>
</body>

</html>
